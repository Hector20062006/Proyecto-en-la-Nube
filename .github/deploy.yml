name: build-and-deploy

on:
  push:
    branches: ["main"]

jobs:
  build_push_deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Apache image (prod)
        run: |
          IMAGE_URI=${{ steps.ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest
          docker build -t "$IMAGE_URI" docker/web/apache
          docker push "$IMAGE_URI"
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

      - name: Deploy via SSM to Web instance
        run: |
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=tag:Name,Values=cloud-web-ldap-web" \
            --parameters 'commands=[
              "set -e",
              "mkdir -p /opt/cloud-web-ldap",
              "cd /opt/cloud-web-ldap",
              "cat > docker-compose.prod.yml <<EOF\nservices:\n  apache:\n    image: '${{ env.IMAGE_URI }}'\n    ports:\n      - \"80:80\"\n      - \"443:443\"\n    environment:\n      - DOMAIN_BASE=example.com\n      - LDAP_HOST=ldap.example.com\n      - LDAP_BASE_DN=dc=example,dc=com\n      - LDAP_USERS_OU=ou=people\n      - LDAP_GROUPS_OU=ou=groups\n      - LDAP_BIND_DN=cn=admin,dc=example,dc=com\n      - LDAP_BIND_PW=admin_password\n      - LDAP_REQUIRE_GROUP=cn=admins,ou=groups,dc=example,dc=com\n    volumes:\n      - ./ssl:/etc/apache2/ssl:ro\n  php:\n    image: php:8.2-fpm-alpine\n    volumes:\n      - ./app-php:/var/www/phpapp:ro\n  tomcat:\n    image: tomcat:10-jdk17\nEOF",
              "docker compose -f docker-compose.prod.yml pull || true",
              "docker compose -f docker-compose.prod.yml up -d"
            ]'
