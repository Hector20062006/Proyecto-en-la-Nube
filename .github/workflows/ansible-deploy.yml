name: Docker Build & Publish

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Instalar Ansible y OpenSSH
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible openssh-client

      - name: Configurar clave SSH
        # Inyectamos el secret como variable de entorno para proteger el formato
        env:
          SSH_PRIVATE_KEY: ${{ secrets.ANSIBLE_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          # Volcamos la variable de entorno entre comillas dobles al fichero
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Configurar clave SSH
        id: config_clave_ssh # Le asignamos una etiqueta única a este paso
        env:
          SSH_PRIVATE_KEY: ${{ secrets.ANSIBLE_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Ejecutar Ansible
        # Candado 1: GitHub Actions no arrancará esto si el paso anterior no devolvió un "éxito"
        if: steps.config_clave_ssh.outcome == 'success' 
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          # Candado 2: Verificamos a nivel de Bash que el fichero existe y tiene un tamaño mayor a 0 bytes (-s)
          if [ ! -s ~/.ssh/id_rsa ]; then
            echo "💥 ERROR CRÍTICO: El fichero id_rsa no existe o está vacío. Abortando el despliegue."
            exit 1
          fi
          
          echo "✅ Clave verificada. Lanzando Ansible..."
          ansible-playbook -i ansible-web/host.ini ansible-web/tasks/main.yml --private-key ~/.ssh/id_rsa
