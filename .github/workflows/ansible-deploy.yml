name: Docker Build & Publish

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Instalar Ansible y OpenSSH
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible openssh-client

      - name: Configurar clave SSH desde Base64
        run: |
          mkdir -p ~/.ssh
          # Decodificamos el secret y lo volcamos al fichero de identidad
          echo "${{ secrets.ANSIBLE_PRIVATE_KEY }}" | base64 -d > ~/.ssh/id_rsa
          # Aplicamos los permisos estrictos obligatorios
          chmod 600 ~/.ssh/id_rsa

      - name: Ejecutar Ansible
        env:
          # Desactivamos el chequeo de fingerprint para evitar bloqueos interactivos
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          # Forzamos a Ansible a utilizar el fichero que acabamos de generar
          ansible-playbook -i ansible-web/host.ini ansible-web/tasks/main.yml --private-key ~/.ssh/id_rsa