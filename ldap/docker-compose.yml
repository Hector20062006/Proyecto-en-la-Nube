services:
  ldap:
    image: osixia/openldap:1.5.0
    container_name: ldap
    restart: unless-stopped
    environment:
      LDAP_ORGANISATION: "hector"
      LDAP_DOMAIN: "hector.local"
      LDAP_ADMIN_PASSWORD: "hector"
      LDAP_TLS: "true"
      LDAP_TLS_CRT_FILENAME: "fullchain.pem"
      LDAP_TLS_KEY_FILENAME: "privkey.pem"
      LDAP_TLS_CA_CRT_FILENAME: "chain.pem"
      LDAP_TLS_VERIFY_CLIENT: "never"
    volumes:
      - ./data/database:/var/lib/ldap
      - ./data/config:/etc/ldap/slapd.d
      - ./certs:/container/service/slapd/assets/certs
      - ./bootstrap:/container/service/slapd/assets/config/bootstrap/ldif/custom
    ports:
      - "636:636"
