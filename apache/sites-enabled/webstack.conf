
# Asegurar que las variables de entorno están disponibles
PassEnv DOMAIN LE_EMAIL LDAP_URL LDAP_BIND_DN LDAP_BIND_PW LDAP_ADMINS_GROUP_DN

<VirtualHost *:80>
    ServerName ${ENV:DOMAIN}
    # Redirigir todo el tráfico HTTP a HTTPS
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>

<VirtualHost *:443>
    ServerName ${ENV:DOMAIN}

    SSLEngine on
    SSLCertificateFile /etc/apache2/ssl/fullchain.pem
    SSLCertificateKeyFile /etc/apache2/ssl/privkey.pem

    # Protocolos seguros
    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite HIGH:!aNULL:!MD5:!3DES
    SSLHonorCipherOrder on

    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    Header set X-Served-By "apache-docker"

    DocumentRoot /var/www/frontend

    # Configuración para el Frontend estático
    <Directory /var/www/frontend>
        Require all granted
        Options -Indexes
        AllowOverride All
    </Directory>

    # Configuración para la aplicación PHP
    # Asumimos que la app PHP está en /phpapp o similar, o servimos PHP para archivos .php
    # Si la app PHP es una subcarpeta o alias:
    Alias /phpapp /var/www/phpapp
    <Directory /var/www/phpapp>
        Require all granted
        Options -Indexes
        AllowOverride All
    </Directory>
    
    # Prerrequisito para PHP-FPM
    <FilesMatch \.php$>
        SetHandler "proxy:fcgi://php:9000"
    </FilesMatch>

    # Configuración de Admin (Protegido por LDAP)
    Alias /admin /var/www/frontend/admin
    <Directory /var/www/frontend/admin>
        AuthType Basic
        AuthName "LDAP Login"
        AuthBasicProvider ldap

        # Configuración LDAP
        AuthLDAPURL "${ENV:LDAP_URL}"
        AuthLDAPBindDN "${ENV:LDAP_BIND_DN}"
        AuthLDAPBindPassword "${ENV:LDAP_BIND_PW}"
        
        # Requerir grupo específico
        Require ldap-group ${ENV:LDAP_ADMINS_GROUP_DN}

        Options -Indexes
    </Directory>

    # Logs
    ErrorLog /var/log/apache2/error.log
    CustomLog /var/log/apache2/access.log combined
</VirtualHost>
