<VirtualHost *:443>
  ServerName ${DOMAIN}

  SSLEngine on
  SSLCertificateFile /etc/apache2/ssl/fullchain.pem
  SSLCertificateKeyFile /etc/apache2/ssl/privkey.pem

  Alias /admin /var/www/frontend/admin

  <Directory /var/www/frontend/admin>
    AuthType Basic
    AuthName "LDAP Login"
    AuthBasicProvider ldap

    # LDAPS (ejemplo: ldaps://10.0.2.10:636/ou=people,dc=example,dc=org?uid)
    AuthLDAPURL "${LDAP_URL}"
    AuthLDAPBindDN "${LDAP_BIND_DN}"
    AuthLDAPBindPassword "${LDAP_BIND_PW}"

    Require ldap-group ${LDAP_ADMINS_GROUP_DN}

    Options -Indexes
  </Directory>
</VirtualHost>