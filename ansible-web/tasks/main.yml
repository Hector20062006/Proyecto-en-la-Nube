- name: Administrando Docker y desplegando WebStack (Apache)
  hosts: ec2
  become: true
  gather_facts: true

  vars_files:
    - ../vars/main.yml

  tasks:
    - name: Comprobar si docker está instalado
      ansible.builtin.command: docker --version
      register: docker_check
      changed_when: false
      failed_when: false

    - name: Instalar Docker si no está instalado
      ansible.builtin.import_tasks: Instalar-docker.yml
      when: docker_check.rc != 0

    - name: Comprobar si docker compose plugin está disponible
      ansible.builtin.command: docker compose version
      register: compose_check
      changed_when: false
      failed_when: false

    - name: Instalar docker compose plugin si no está disponible
      ansible.builtin.apt:
        name: docker-compose-plugin
        state: present
        update_cache: true
      when: compose_check.rc != 0

    - name: Comprobar si existe despliegue anterior
      ansible.builtin.stat:
        path: /opt/webstack/docker-compose.yml
      register: stack_exists

    - name: Detener y eliminar contenedores/imágenes antiguos
      ansible.builtin.command:
        cmd: docker compose down --rmi local --volumes --remove-orphans
        chdir: /opt/webstack
      when: stack_exists.stat.exists
      changed_when: true
      ignore_errors: true

    - name: Eliminar imagen PHP antigua si existe
      ansible.builtin.shell: docker rmi webstack-php:latest webstack-php || true
      changed_when: false
      ignore_errors: true

    - name: Eliminar directorio de despliegue completo
      ansible.builtin.file:
        path: /opt/webstack
        state: absent

    - name: Crear estructura de directorios en /opt/webstack
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /opt/webstack
        - /opt/webstack/apache
        - /opt/webstack/apache/sites-enabled
        - /opt/webstack/apps
        - /opt/webstack/prometheus
        - /opt/webstack/php

    - name: Copiar docker-compose.yml
      ansible.builtin.copy:
        src: ../../docker-compose.yml
        dest: /opt/webstack/docker-compose.yml
        mode: "0644"

    - name: Copiar configuración de Apache
      ansible.builtin.copy:
        src: ../../apache/
        dest: /opt/webstack/apache/
        mode: "0755"

    - name: Copiar configuración de PHP
      ansible.builtin.copy:
        src: ../../php/
        dest: /opt/webstack/php/
        mode: "0755"

    - name: Crear directorio SSL en remoto
      ansible.builtin.file:
        path: /opt/webstack/apache/ssl
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Generar certificado autofirmado si no existe
      ansible.builtin.command: >
        openssl req -x509 -nodes -days 365 -newkey rsa:2048
        -keyout /opt/webstack/apache/ssl/privkey.pem
        -out /opt/webstack/apache/ssl/fullchain.pem
        -subj "/CN={{ domain | default('localhost') }}"
      args:
        creates: /opt/webstack/apache/ssl/fullchain.pem

    - name: Generar configuración de VirtualHost con Jinja2
      ansible.builtin.template:
        src: ../templates/webstack.conf.j2
        dest: /opt/webstack/apache/sites-enabled/webstack.conf
        mode: "0644"

    - name: Copiar aplicaciones (apps)
      ansible.builtin.copy:
        src: ../../apps/
        dest: /opt/webstack/apps/
        mode: "0755"

    - name: Copiar configuración de Prometheus
      ansible.builtin.copy:
        src: ../../prometheus/
        dest: /opt/webstack/prometheus/
        mode: "0644"

    - name: Crear archivo .env del stack desde plantilla
      ansible.builtin.template:
        src: ../templates/env.j2
        dest: /opt/webstack/.env
        mode: "0600"

    - name: Descargar imágenes base (Pull)
      ansible.builtin.command:
        cmd: docker compose pull
        chdir: /opt/webstack
      register: compose_pull
      changed_when: "'Downloaded' in compose_pull.stdout"

    - name: Construir imágenes (Force Rebuild)
      ansible.builtin.command:
        cmd: docker compose build --no-cache
        chdir: /opt/webstack
      register: compose_build
      changed_when: "'Building' in compose_build.stdout"

    - name: Levantar contenedores (Up)
      ansible.builtin.command:
        cmd: docker compose up -d
        chdir: /opt/webstack
      register: compose_up
      changed_when: "'Started' in compose_up.stdout or 'Recreated' in compose_up.stdout"

    - name: Actualizar certificados CA en el contenedor Apache
      ansible.builtin.command: docker exec apache update-ca-certificates
      changed_when: false

    - name: Recargar configuración de Apache
      ansible.builtin.command: docker exec apache apachectl -k graceful
      changed_when: false

    - name: Ver contenedores activos
      ansible.builtin.command: docker ps
      changed_when: false

    - name: Esperar a HTTPS 443 (Apache)
      ansible.builtin.wait_for:
        port: 443
        delay: 5
        timeout: 300
