---
- name: Crear directorio keyrings
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Descargar clave GPG de Docker (ASCII)
  ansible.builtin.get_url:
    url: "https://download.docker.com/linux/ubuntu/gpg"
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
    force: true

- name: Obtener arquitectura dpkg
  ansible.builtin.command: dpkg --print-architecture
  register: dpkg_arch
  changed_when: false

- name: Añadir repo oficial de Docker (Ubuntu noble)
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ dpkg_arch.stdout }} signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu
      {{ ansible_facts['distribution_release'] }} stable
    filename: docker
    state: present

- name: Instalar Docker Engine y plugins
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    update_cache: true
    state: present

- name: Habilitar y arrancar Docker
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Asegurar grupo docker
  ansible.builtin.group:
    name: docker
    state: present

- name: Añadir usuario actual al grupo docker
  ansible.builtin.user:
    name: "{{ ansible_user | default('hector') }}"
    groups: docker
    append: true
  failed_when: false
